name: Build Tweak

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Install SDK
        run: |
          mkdir -p $HOME/theos/sdks
          cd $HOME/theos/sdks
          curl -L -o iPhoneOS12.4.sdk.tar.xz https://github.com/theos/sdks/releases/download/master/iPhoneOS12.4.sdk.tar.xz
          tar -xf iPhoneOS12.4.sdk.tar.xz

      - name: Build Package
        run: |
          make clean
          make package FINALPACKAGE=1

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: appstoretroller-deb
          path: packages/*.deb

name: Build Tweak

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install ldid make

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Install iOS SDK
        run: |
          mkdir -p ~/theos/sdks
          cd ~/theos/sdks
          curl -L -o iPhoneOS12.4.sdk.tar.xz https://github.com/theos/sdks/releases/download/master/iPhoneOS12.4.sdk.tar.xz
          tar -xf iPhoneOS12.4.sdk.tar.xz

      - name: Build Package
        run: |
          export THEOS=$HOME/theos
          make clean
          make package FINALPACKAGE=1

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: deb-file
          path: packages/*.deb
